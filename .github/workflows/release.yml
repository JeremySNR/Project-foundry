# Release pipeline: GHCR image + GitHub release.
#
# Two ways to trigger:
#   - push a tag vX.Y.Z (the original flow), or
#   - run it from the Actions tab (workflow_dispatch) with a version input -
#     the release step then creates the tag on the dispatched commit itself.
#
# GHCR uses the built-in GITHUB_TOKEN.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. v1.2.0 (tag is created if it does not exist)"
        required: true

permissions:
  contents: read

jobs:
  test:
    name: Full test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,workflow]"
          pytest -q

  image:
    name: Publish image to GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Resolve version
        id: version
        env:
          RAW: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          BARE="${RAW#v}"
          echo "bare=${BARE}" >> "$GITHUB_OUTPUT"
          echo "minor=${BARE%.*}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.bare }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: GitHub release
    needs: image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        # --target creates the tag at the dispatched commit when it does not
        # exist yet; it is ignored when the workflow ran from a tag push.
        run: gh release create "$VERSION" --target "$GITHUB_SHA" --generate-notes
