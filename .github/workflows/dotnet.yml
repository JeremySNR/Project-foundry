name: .NET

on:
  push:
    branches: ["**"]
    paths:
      - "dotnet/**"
      - ".github/workflows/dotnet.yml"
  pull_request:
    paths:
      - "dotnet/**"
      - ".github/workflows/dotnet.yml"

jobs:
  test:
    name: .NET tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release

      - name: Run the offline demo
        run: dotnet run --project src/Foundry.Demo --configuration Release --no-build
