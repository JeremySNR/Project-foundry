name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,workflow]"

      - name: Run tests
        run: pytest -q

  postgres:
    name: Postgres tests + migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: foundry
          POSTGRES_PASSWORD: foundry
          POSTGRES_DB: foundry
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U foundry"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      FOUNDRY_TEST_DATABASE_URL: postgresql+psycopg2://foundry:foundry@localhost:5432/foundry
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,postgres]"

      - name: Apply Alembic migrations against Postgres
        env:
          FOUNDRY_DATABASE_URL: postgresql+psycopg2://foundry:foundry@localhost:5432/foundry
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Run Postgres smoke tests
        run: pytest -q tests/test_postgres_smoke.py

  image:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t project-foundry .

  policy:
    name: OPA policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa

      - name: Run policy tests
        run: opa test src/foundry/policy -v
