name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  # Reusable so the release pipeline runs the exact same gate (see release.yml).
  workflow_call: {}

# Cancel superseded runs on the same ref. push + pull_request would otherwise
# double-run same-repo PRs; this keeps one live run per ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint
        run: ruff check src tests

  test:
    name: Python tests (offline)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,workflow]"

      # Declared network use: with the [workflow] extra installed,
      # tests/test_temporal_workflow.py fetches Temporal's time-skipping
      # test-server binary over the network at runtime (it skips gracefully
      # when the download is unavailable). The rest of the suite is offline.
      - name: Run tests
        run: pytest -q

  postgres:
    name: Postgres tests + migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: foundry
          POSTGRES_PASSWORD: foundry
          POSTGRES_DB: foundry
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U foundry"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      FOUNDRY_TEST_DATABASE_URL: postgresql+psycopg2://foundry:foundry@localhost:5432/foundry
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,postgres]"

      - name: Apply Alembic migrations against Postgres
        env:
          FOUNDRY_DATABASE_URL: postgresql+psycopg2://foundry:foundry@localhost:5432/foundry
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Run Postgres smoke tests
        run: pytest -q tests/test_postgres_smoke.py

  image:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build -t project-foundry .

      # 30-second smoke: boot the image on its in-memory SQLite default (no
      # token, no config) and confirm /healthz answers. Catches a broken
      # image/entrypoint before it can be published.
      - name: Smoke test the running image
        run: |
          docker run -d --name foundry-smoke -p 8000:8000 project-foundry
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8000/healthz >/dev/null; then
              ok=1
              break
            fi
            sleep 1
          done
          echo "--- container logs ---"
          docker logs foundry-smoke || true
          docker rm -f foundry-smoke >/dev/null 2>&1 || true
          if [ "$ok" != "1" ]; then
            echo "::error::/healthz did not become ready within 30s"
            exit 1
          fi
          echo "/healthz OK"

  policy:
    name: OPA policy tests
    runs-on: ubuntu-latest
    # Pin OPA to a specific release and verify its checksum. The previous
    # 'downloads/latest' URL was non-reproducible and a supply-chain vector.
    env:
      OPA_VERSION: v1.4.2
      OPA_SHA256: 2c0ccdbbe0b8e2a5d12d9c42d92f1f34f494ffb32d1f3c4ddc36101be637d66f
    steps:
      - uses: actions/checkout@v5

      - name: Install OPA (pinned + checksum-verified)
        run: |
          curl -fsSL -o opa \
            "https://github.com/open-policy-agent/opa/releases/download/${OPA_VERSION}/opa_linux_amd64_static"
          echo "${OPA_SHA256}  opa" | sha256sum -c -
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: Run policy tests
        run: opa test src/foundry/policy -v
