# Project Foundry config. Copy to foundry.yaml and point FOUNDRY_CONFIG at it.
#
# This file is for BEHAVIOUR. Secrets (webhook signing secrets, API tokens, the
# database URL) come from the environment, never from here. Anything you set in
# the environment overrides what's written below.

database:
  # Usually set via FOUNDRY_DATABASE_URL instead. SQLite is the default.
  url: "sqlite+pysqlite:///:memory:"
  # Artifact payloads (foundry_artifacts.content_json) can be encrypted at rest.
  # This is a SECRET, so it comes from the environment, never this file:
  #   FOUNDRY_ARTIFACT_ENCRYPTION_KEY  - a Fernet key (url-safe base64, 32 bytes;
  #                                      generate with cryptography.fernet.Fernet
  #                                      .generate_key()). Comma-separate keys to
  #                                      rotate (the first encrypts; all decrypt).
  # Needs the optional 'crypto' extra (pip install project-foundry[crypto]); a key
  # set without it fails closed at startup. Unset => payloads stored as plaintext.
  # Content hashes are computed over plaintext, so audit integrity is unaffected.

analyzer:
  # "heuristic" needs no API key and is fully deterministic.
  # "openai" uses GPT-5.5 for the pre-approval gate (set OPENAI_API_KEY).
  provider: heuristic
  model: gpt-5.5

risk:
  # Risk classification backend (override with FOUNDRY_RISK_PROVIDER):
  #   heuristic - keyword lists on ticket text + path globs on the diff
  #               (default, deterministic, no API key)
  #   llm       - adds an LLM pass that cites its evidence into the audit
  #               trail (set OPENAI_API_KEY). The heuristic stays as a hard
  #               floor: the LLM may only ESCALATE risk, never downgrade it.
  #               Costs one model call at intake plus one per PR-push event.
  provider: heuristic
  model: gpt-5.5
  # Extra keywords for the *ticket-text* heuristic, layered on top of the
  # built-in keyword floor (sensitive-area name -> extra keywords). Teach the
  # classifier your domain vocabulary without forking - the ticket-text twin of
  # policy.sensitive_path_globs below. Strictly additive: extras can only flag
  # MORE areas, never fewer, so they only ever escalate risk. Area names must be
  # one of the seven built-in areas (auth, payments, customer_data, pii,
  # database_migration, infrastructure, production_deploy) or load fails.
  # extra_sensitive_keywords:
  #   payments: ["pan", "cardholder", "tokenisation"]
  #   customer_data: ["member record", "loyalty profile"]
  # Operator-defined *custom* risk categories beyond the fixed seven built-in
  # areas (issue #155). Each category has a slug name (must NOT collide with a
  # built-in area), ticket-text `keywords` and/or diff `path_globs` triggers, and
  # the approval `required_roles` it demands. A category that fires on the ticket
  # text demands its roles at the policy gate (an approver lacking them is refused
  # up front); one that fires on a PR diff path escalates the run to human review
  # unless an approver already granted the role. Strictly additive / escalate-only:
  # a category can only ever ADD a required approval, never drop a built-in area's
  # role or lower risk. The roles reach the gate via the resolved-roles field both
  # the Python engine and foundry.rego already read, so there is no new gate rule
  # or Rego change. Valid roles: product, engineering, security, qa.
  # custom_risk_categories:
  #   crypto_keys:
  #     keywords: ["signing key", "hsm", "kms"]
  #     path_globs: ["**/crypto/**", "**/keys/**"]
  #     required_roles: ["security", "engineering"]
  #   gdpr_subject_data:
  #     keywords: ["data subject", "right to erasure"]
  #     required_roles: ["security"]

planner:
  # Delivery planner backend (override with FOUNDRY_PLANNER_PROVIDER):
  #   template - renders deterministic "Satisfy acceptance criterion: X" steps
  #              (default, no API key)
  #   llm      - adds an LLM pass that produces file-level steps, test locations
  #              and verify commands from the code-aware context, and populates
  #              the plan's expected_files_or_areas (set OPENAI_API_KEY; pairs
  #              best with context.provider: code). Safety guardrails stay
  #              deterministic - the model can enrich the plan but never relax a
  #              constraint - and an LLM failure degrades to the template plan.
  #              Costs one model call per buildable, confidently-routed run.
  provider: template
  model: gpt-5.5

decomposition:
  # Epic decomposition backend (override with FOUNDRY_DECOMPOSITION_PROVIDER).
  # Only consulted on the epic-intake path (epics.auto_decompose below, or an
  # explicit epic intake); inert otherwise.
  #   heuristic - deterministic producer: an explicit "Repositories:" section,
  #               or >= 2 associated repos (default, no API key)
  #   llm       - adds an inference pass that recovers epics described only in
  #               prose ("migrate the ledger in billing-api and the checkout in
  #               customer-web") where neither heuristic shape is present (set
  #               OPENAI_API_KEY). The heuristic decomposer stays a hard floor:
  #               the LLM only ADDS a split the heuristic missed, never removes
  #               or re-scopes one; every proposed repo must appear verbatim in
  #               the ticket text (no invented repos); fewer than two grounded
  #               repos => degrade to the deterministic result. Each child run
  #               is still independently gated and approved - no gate weakened.
  #               Costs one model call per epic-intake.
  provider: heuristic
  model: gpt-5.5

policy:
  # Not sure where to start? Foundry ships a vetted starter library of policy
  # presets (issue #31). `foundry-policy presets` lists them (baseline / soc2 /
  # change-management / pci-dss); `foundry-policy show <name>` prints one to copy
  # in here; `foundry-policy explain <name>` shows the gate knobs it resolves to
  # (including the two-person-rule approval count and per-path roles). The
  # presets use only the knobs below - they are a head start, not a new mechanism.
  #
  # Policy backend: "local" (in-process Python engine, the default) or "opa"
  # (delegate to an OPA server running src/foundry/policy/foundry.rego). Both
  # enforce identical rules - lock-step is machine-verified over shared vectors
  # (tests/test_policy_parity.py + scripts/policy_parity.py).
  provider: local
  # OPA decision endpoint base URL; required only when provider is "opa".
  # The repo_confidence_threshold below is sent to OPA so the two backends
  # evaluate against the same value.
  # opa_url: http://opa:8181
  # Live user policy bundle (issue #154). Point this at a separately-authored
  # file (with the same policy:/risk: knobs as this one) and Foundry merges it
  # ON TOP OF the resolved config at load as a STRICTLY-ADDITIVE overlay - your
  # config plus the built-in gate rules stay a non-overridable floor, so the
  # bundle can only ever make the gate *stricter* (add protected paths, required
  # roles, escalations and freezes; raise the confidence/approval thresholds;
  # tighten the file/retry/cost caps; narrow which failures auto-retry). A value
  # that would weaken the floor is ignored, and a bundle that would weaken any
  # built-in denial/approval requirement fails loud at load. Lets e.g. a security
  # team own a reviewed, independently-versioned bundle without forking the app
  # or hand-editing this file. It may carry ONLY policy knobs (anything else is
  # rejected) and is loaded from this path, never from a request. Also settable
  # via FOUNDRY_POLICY_BUNDLE_PATH. Unset (default) = no overlay.
  # bundle_path: /etc/foundry/security-policy-bundle.yaml
  # A run is blocked unless one repo clears this confidence (0-100).
  repo_confidence_threshold: 70
  # PRs larger than this are routed to human review.
  max_files_changed: 12
  # Paths an agent may never touch. Matches block the run (sticky; never retried).
  # Use the `**/...` form for dirs that can appear at any depth — a bare
  # `migrations/**` only matches a top-level dir, so a nested
  # `services/api/migrations/0001.py` would slip the hard block.
  forbidden_globs:
    - "infra/**"
    - "**/infra/**"
    - "migrations/**"
    - "**/migrations/**"
    - "**/.env*"
    - "**/secrets/**"
  # Per-repo protected subtrees for monorepos / multi-repo orgs (issue #35,
  # path-scoped policy). These globs are added to `forbidden_globs` above *only*
  # for runs routed to the named repo - strictly additive, so a repo can make
  # the sticky block stricter but never weaken the global floor. The repo name
  # is the one Foundry routed the run to (the context bundle's best repository).
  # repo_forbidden_globs:
  #   payments-service: ["**/ledger/**", "**/reconciliation/**"]
  #   platform-monorepo: ["services/billing/**", "services/identity/**"]
  # Per-repo required approval roles (issue #31, per-repo policy scoping /
  # multi-role approval matrices). Any run routed to the named repo additionally
  # requires these approval roles, on top of whatever the risk classifier derives
  # (auth/infrastructure -> engineering, customer_data/pii/payments -> security).
  # Strictly additive: a repo can only *add* a required approval, never remove a
  # risk-derived one, so the approval gate is a one-way ratchet towards stricter.
  # Valid roles: product, engineering, security, qa (validated at load). The repo
  # name is the one Foundry routed the run to (the context bundle's best repo).
  # repo_required_roles:
  #   payments-service: ["security"]
  #   platform-monorepo: ["engineering", "security"]
  # N-of-M approval matrix (issue #31, the "two-person rule"). Minimum number of
  # *distinct* human approvers a run needs before it leaves WAITING_APPROVAL for
  # APPROVED. Default 1 = the historical single-approval lifecycle. Approvals
  # accumulate (each is its own audited sign-off, a duplicate from the same
  # person is refused) and the run only advances once the count is met - it is
  # enforced in the orchestrator lifecycle, like the forbidden-path block, so it
  # adds no policy-engine/Rego rule. Each approver must independently hold any
  # required roles (above), so N-of-M composes with the role requirements.
  # min_approvals: 2
  # Per-repo override: the effective minimum for a run routed to the named repo
  # is max(min_approvals, this value), so a repo can only ever demand *more*
  # sign-offs than the global floor, never fewer (a one-way ratchet to stricter).
  # repo_min_approvals:
  #   payments-service: 3
  # Per-*path* required approval roles (issue #31/#35, per-path policy scoping for
  # monorepos). Unlike repo_required_roles (resolved at intake from the routed
  # repo, before any diff exists), these are evaluated *diff-aware* on every PR
  # push: if a PR's diff touches a configured path glob whose role is not already
  # covered by the run's approvers, the run escalates to "review required" for a
  # human sign-off. Use this to protect a sub-tree (e.g. a monorepo's billing or
  # identity service) without forcing the role on every run routed to the repo.
  # Strictly additive: it can only ever *escalate* a run to human review, never
  # release one. Valid roles: product, engineering, security, qa (validated at
  # load). Enforced in the orchestrator lifecycle (like the forbidden-path block),
  # so it adds no policy-engine/Rego rule.
  # path_required_roles:
  #   "**/billing/**": ["security"]
  #   "services/identity/**": ["engineering", "security"]
  # Plan-scope drift escalation: the consumer of the LLM planner's
  # expected_files_or_areas (the plan-vs-diff check). When on (the default), a PR
  # whose diff changes files outside *every* file/area the approved plan declared
  # escalates the run to "review required" - the "agent strayed outside its
  # approved scope" signal. Strictly additive (it can only ever escalate to a
  # human, never release a run) and enforced in the orchestrator lifecycle, so it
  # adds no policy-engine/Rego rule. Inert unless the plan actually declares
  # expected files/areas: the default template planner declares none, so this
  # changes nothing until you enable planner.provider: llm. Set False to disable.
  # enforce_plan_scope: true
  # Plan out-of-scope escalation (issue #169): the out-of-scope twin of
  # enforce_plan_scope. When on (the default), a PR whose diff changes a path/area
  # the approved plan explicitly listed under out_of_scope (promised *not* to
  # touch) escalates the run to "review required" - a stronger off-plan signal
  # than mere scope drift. Same family: orchestrator-only (no Rego rule), strictly
  # additive (escalate-only), and inert unless the plan declares out_of_scope
  # entries (the template planner declares none). Set False to disable.
  # enforce_plan_out_of_scope: true
  # Plan-tests satisfaction escalation (issue #169, slice 2): when on, a PR whose
  # approved plan promised tests (any test_plan.unit_tests / integration_tests /
  # e2e_tests) but whose diff touches *no* test file (per test_path_globs below)
  # escalates the run to "review required" - the "plan promised tests, diff shipped
  # none" signal. Same family: orchestrator-only (no Rego rule), strictly additive
  # (escalate-only), and inert when the plan declares no tests. Defaults OFF: it is
  # a heuristic whose test-path convention may need per-repo tuning first, and the
  # template planner already promises a unit test per AC, so leaving it off keeps
  # current behaviour unchanged. Set True to enable.
  # enforce_plan_tests: false
  # Test-path convention enforce_plan_tests uses to recognise a changed file as a
  # test. Tune per repo; the default covers common Python, JS/TS and tests/ layouts.
  # test_path_globs:
  #   - "**/test_*.py"
  #   - "**/*_test.*"
  #   - "**/*.test.*"
  #   - "**/*.spec.*"
  #   - "tests/**"
  #   - "**/tests/**"
  #   - "**/__tests__/**"
  # Plan-satisfaction judge (issue #169, slice 3): the headline plan-aware gate.
  # The two checks above reason about file *containment*; this one reasons about
  # whether the diff actually *does what the plan said*. With provider: llm an
  # escalate-only LLM pass reads the approved plan's intent (goal/scope/steps) +
  # the PR diff summary and escalates the run to "review required" when the change
  # does not plausibly satisfy the plan. Orchestrator-only (no Rego rule),
  # escalate-only, and degrade-to-noop: any LLM failure leaves the deterministic
  # gates in charge (never blocks or releases a run). Default "none" = no judge.
  # plan_satisfaction:
  #   provider: llm                # "none" (default) | "llm"
  #   model: gpt-5.5
  # Change-freeze / maintenance windows (issue #31, the "time windows" policy
  # dimension). During an active window Foundry holds an *autonomous* re-dispatch
  # (the auto-retry on CI failure / changes requested) and escalates the run to
  # "review required" instead, so no code ships unattended during the freeze. The
  # initial, human-approved dispatch is not gated (a human is already in the loop).
  # Each window is either recurring weekly (weekdays + start/end local time in an
  # IANA tz) or an absolute calendar range (starts_at/ends_at, ISO-8601). An "end"
  # earlier than "start" wraps past midnight. Strictly additive: a freeze can only
  # ever hold work for a human, never release it. Enforced in the orchestrator
  # lifecycle (like the forbidden-path block), so it adds no policy-engine/Rego
  # rule. Validated at load (real weekdays, a resolvable tz, well-formed times).
  # change_freeze_windows:
  #   - reason: "Weekend release blackout"
  #     weekdays: ["sat", "sun"]
  #     start: "00:00"
  #     end: "23:59"
  #     tz: "UTC"
  #   - reason: "Year-end change freeze"
  #     starts_at: "2026-12-20T00:00:00"
  #     ends_at: "2027-01-02T00:00:00"
  #     tz: "America/New_York"
  # Diff-aware risk: if a PR touches these paths and the upfront (ticket-text)
  # risk pass never flagged the area, the run escalates to human review.
  # Override per area; unlisted areas keep the built-in defaults.
  sensitive_path_globs:
    auth: ["**/auth/**", "**/login/**", "**/session*/**", "**/sso/**", "**/oauth/**"]
    payments: ["**/payment*/**", "**/billing/**", "**/stripe/**", "**/checkout/**"]
    database_migration: ["**/migrations/**", "**/alembic/**"]
    infrastructure: ["infra/**", "**/terraform/**", "**/helm/**", "**/k8s/**", "**/.github/workflows/**"]
    customer_data: ["**/customers/**", "**/customer_data/**"]

remediation:
  # When CI fails or a reviewer requests changes, Foundry re-dispatches the
  # agent with the failure context - still through the policy gate. After the
  # cap, the run parks at "review required" for a human.
  max_agent_retries: 2
  retry_on: ["ci_failed", "changes_requested"]

budget:
  # Deny agent dispatch once a run's spend reaches this many USD. Enforced at
  # first dispatch and on every retry (the gate compares *projected* spend:
  # recorded cost so far plus the next dispatch's estimate). Omit (or null) for
  # no cap.
  max_cost_per_run: 25.0
  # Fallback per-dispatch cost (USD) for providers that don't report spend.
  # Only some providers expose usage (e.g. Cursor Cloud reports cost_usd); with
  # claude_code / webhook / manual the cap can never bind on reported cost
  # alone. Set this so each dispatched attempt counts as a proxy and the cap
  # still trips. Provider-reported cost always wins where available.
  # 0 (the default) = no estimate; the cap then needs reported cost to bind.
  estimated_cost_per_dispatch: 0.0

webhook:
  # Replay protection for inbound webhooks (see api/dedup.py).
  #
  # Durable dedup: every delivery id is recorded in foundry_webhook_deliveries
  # (unique per provider+delivery_id), so a replayed/redelivered event is
  # ignored - atomically across workers and across restarts, unlike the old
  # in-process set. Rows older than the TTL are pruned so the table stays
  # bounded. null disables pruning (unbounded growth - not advised).
  dedup_ttl_seconds: 86400        # 24h
  # Optional, fail-closed: reject a delivery whose provider timestamp is older
  # than this many seconds. Only Linear sends a timestamp (webhookTimestamp);
  # GitHub/GitLab/Jira carry only a delivery id, so their replay protection is
  # the dedup table above. Must be <= dedup_ttl_seconds. null disables it.
  replay_max_age_seconds: null

agent:
  # Which coding agent receives approved work:
  #   manual           - record the job for a human (safe default)
  #   cursor_via_linear- @Cursor comment on the Linear issue (needs linear token)
  #   cursor_cloud     - Cursor Cloud Agents API (set FOUNDRY_CURSOR_API_TOKEN)
  #   claude_code      - GitHub Actions workflow_dispatch (set FOUNDRY_GITHUB_API_TOKEN)
  #   webhook          - POST the job to your own endpoint (set FOUNDRY_AGENT_WEBHOOK_*)
  #   auto             - learned dispatch (#33): pick the agent per run from the
  #                      delivery-memory scorecards (the one with the best
  #                      majority-merged history for this work-type/repo). Each
  #                      candidate must be a real, credentialled provider.
  provider: manual
  # Learned dispatch (only used when provider: auto). Candidates the scorecard
  # may route between (each built + credential-checked fail-closed at startup);
  # the fallback agent used when no candidate has a >50%-merged history with at
  # least auto_min_samples runs yet; and that min-sample floor. All committed
  # here - the routing decision never comes from request input. The kill switch
  # is simply not setting provider: auto. A retry always reuses the agent that
  # opened the PR, never re-routing mid-run.
  # auto_candidates: [claude_code, cursor_cloud]
  # auto_fallback: manual
  # auto_min_samples: 3

tracker:
  # Where tickets live:
  #   linear        - the default (set FOUNDRY_LINEAR_API_TOKEN for write-back)
  #   github_issues - the issue is the ticket (set FOUNDRY_GITHUB_API_TOKEN;
  #                   approvers are keyed by GitHub login, not email)
  #   jira          - Jira Cloud (set FOUNDRY_JIRA_BASE_URL / _EMAIL / _API_TOKEN
  #                   and FOUNDRY_JIRA_WEBHOOK_SECRET; or set jira_base_url here)
  provider: linear
  # jira_base_url: "https://yourcompany.atlassian.net"
  # Jira webhooks carry no HMAC signature: the shared secret IS the auth, and
  # the approver identity comes from the payload, so FOUNDRY_JIRA_WEBHOOK_SECRET
  # is effectively an approver-level credential (see SECURITY.md). Foundry reads
  # it from the X-Foundry-Webhook-Token header only. Some Jira webhook UIs can't
  # set headers; set this true to also accept ?token= in the query string, at
  # the cost of leaking the secret into access logs/proxies/link history.
  # jira_allow_query_token: false

# Source control (watching the PR/MR the agent opens):
#   GitHub - set FOUNDRY_GITHUB_API_TOKEN to enrich the changed-file list that
#            feeds the forbidden-path / oversize gates (and FOUNDRY_GITHUB_WEBHOOK_SECRET).
#            If FOUNDRY_GITHUB_WEBHOOK_SECRET is unset, the GitHub PR webhook
#            falls back to FOUNDRY_LINEAR_WEBHOOK_SECRET, so one leaked secret
#            covers both providers — set a distinct GitHub secret in production.
#   GitLab - set FOUNDRY_GITLAB_WEBHOOK_SECRET to enable /webhooks/gitlab, and
#            FOUNDRY_GITLAB_API_TOKEN so MR diffs are fetched and the SAME file
#            gates apply. Without the API token, GitLab MRs are diff-blind:
#            forbidden-path/oversize/sensitive-area gates cannot fire. For
#            self-managed GitLab set FOUNDRY_GITLAB_API_BASE (default
#            https://gitlab.com/api/v4).

# Chat approvals (Slack):
#   Slack - set FOUNDRY_SLACK_SIGNING_SECRET to enable POST /webhooks/slack.
#           Approvers click approve/reject/stop buttons; the request is verified
#           against Slack's v0 request signature with replay-age protection, then
#           driven through the SAME policy gate and role checks as every other
#           surface. The actor is the Slack-signed user id, so when Slack is your
#           approval surface, key the approvers below by Slack user id (e.g.
#           "U07ABC123") rather than email - as GitHub Issues approvers are keyed
#           by login. Fail-closed: no signing secret => endpoint disabled.
#
# Outbound Slack notifications (the message approvers click + status updates):
#   Set FOUNDRY_SLACK_BOT_TOKEN (a bot token, xoxb-...) AND notifications.slack_channel
#   (below; or FOUNDRY_SLACK_CHANNEL). Foundry then posts an interactive approval
#   message (approve/reject/stop buttons that round-trip to /webhooks/slack) when a
#   run parks for approval, plus short status updates (parked, blocked, PR open,
#   merged). Best-effort: a Slack outage never breaks a run. Fail-closed: outbound
#   Slack is wired only when BOTH the bot token and a channel are set.

rate_limit:
  # Coarse per-client request caps on the network surfaces (webhooks + API).
  # Stops a flood of authorised-looking requests - a replayed webhook in a tight
  # loop, a runaway integration, a bearer-token brute force - from exhausting the
  # process. Two independent buckets so a webhook burst can't starve the API.
  # Per-process, fixed 60s window (see src/foundry/api/ratelimit.py for the
  # scope caveats: not shared across workers, keyed by the direct peer address).
  # Env overrides: FOUNDRY_RATE_LIMIT_ENABLED / _WEBHOOK_PER_MINUTE / _API_PER_MINUTE.
  enabled: true
  webhook_per_minute: 120  # provider deliveries can be bursty
  api_per_minute: 60       # approvals, run reads, metrics

dashboard:
  # Approval-queue SLA: how long (seconds) a run may sit parked on a human before
  # the fleet strip and GET /metrics/approvals flag it as breaching. This is a
  # read-only operational signal only - it changes no policy gate and blocks no
  # run; it just turns the "awaiting a human" count into "and 2 are over the SLA".
  # Omit it (the default) for no SLA: the oldest-wait age is still shown, but
  # nothing is flagged as breaching. Env override: FOUNDRY_APPROVAL_SLA_SECONDS
  # (empty string disables it). The clock is dated from when the human was first
  # asked (the APPROVAL_REQUESTED / RISK_ESCALATED audit event), so an N-of-M
  # partial sign-off does not reset it.
  approval_sla_seconds: 14400  # 4h

  # Execution SLA: how long (seconds) a run may sit dispatched to an agent
  # (AGENT_RUNNING - agent working, no PR opened yet) before the fleet strip and
  # GET /metrics/executions flag it as breaching. The machine-state complement to
  # approval_sla_seconds: the hung/runaway-agent signal that turns the bare
  # "agents running" count into "and 1 has been running over the SLA". Read-only:
  # it changes no policy gate and blocks no run. Omit it (the default) for no SLA -
  # the oldest run-time is still shown, but nothing is flagged. Env override:
  # FOUNDRY_EXECUTION_SLA_SECONDS (empty string disables it). The clock is dated
  # from the run's latest AGENT_STARTED event, so a retry re-dispatch resets it to
  # the current attempt.
  execution_sla_seconds: 3600  # 1h

  # Execution cost SLA: how many dollars an in-flight agent run (AGENT_RUNNING)
  # may spend before the fleet strip and GET /metrics/executions flag it - the
  # spend twin of execution_sla_seconds, the "this agent has burned over $N and is
  # still running" signal that turns "agents running" into "and 1 has spent over
  # $5". It fires for a human *before* the hard policy.max_cost_per_run budget cap
  # (which blocks the run); this is read-only and blocks no run. Omit it (the
  # default) for no cost SLA - per-run spend is still shown, but nothing is
  # flagged. Env override: FOUNDRY_EXECUTION_COST_SLA_USD (empty string disables
  # it). Per-run spend is the sum of the run's agent jobs' reported cost (runs
  # whose provider reports no cost, e.g. manual/webhook, show no figure).
  execution_cost_sla_usd: 5.0  # $5 per run

  # Review SLA: how long (seconds) a run may sit at an open PR (PR_OPEN - the
  # agent shipped a PR, now awaiting review/CI) before the fleet strip and
  # GET /metrics/reviews flag it as breaching. The review-side complement to
  # approval_sla_seconds / execution_sla_seconds: the "PRs sitting unreviewed for
  # N hours" signal, the one place delivery stalls after Foundry has done its job
  # (the product deliberately stops at a reviewed PR). Read-only: it changes no
  # policy gate and blocks no run. Omit it (the default) for no SLA - the oldest
  # review age is still shown, but nothing is flagged. Env override:
  # FOUNDRY_REVIEW_SLA_SECONDS (empty string disables it). The clock is dated from
  # the PR_OPENED audit event (when the PR first opened), so a later push does not
  # reset it.
  review_sla_seconds: 86400  # 24h

  # Review staleness SLA: how long (seconds) an open PR may go with NO observed
  # activity (no PR_OPENED/PR_UPDATED - i.e. no push) before the fleet strip and
  # GET /metrics/reviews flag it as stale. Distinct from review_sla_seconds (total
  # open time): this is the "stale since last push" signal that tells an
  # actively-pushed PR from an abandoned one - "which open PRs has nobody touched
  # in N hours?". Read-only: it changes no policy gate and blocks no run. Omit it
  # (the default) for no signal - the "since last push" age is still shown, but
  # nothing is flagged. Env override: FOUNDRY_REVIEW_STALE_SLA_SECONDS (empty
  # string disables it). The clock is dated from the latest PR_OPENED/PR_UPDATED
  # event, so a fresh push resets it.
  review_stale_sla_seconds: 172800  # 48h

  # Compliance baseline (issue #31): a preset name (soc2 / pci-dss /
  # change-management / baseline - see `foundry-policy presets`) OR a path to
  # another config file. When set, GET /metrics/policy/check and the dashboard
  # compliance panel report, control by control, whether THIS deployment's gate is
  # at least as strict as the baseline - the always-on, in-app twin of
  # `foundry-policy check --against`, so "has our gate drifted below SOC 2?" is
  # answerable on the dashboard, not just from a one-shot CLI run in CI. Read-only:
  # it labels the gate, it changes and blocks nothing; it uses only the existing,
  # already-gated knobs, so it adds no policy mechanism. Omit it (the default) for
  # no check. Env override: FOUNDRY_POLICY_BASELINE (empty string disables it). An
  # unresolvable baseline (typo'd preset / missing file) fails LOUD at startup, so
  # a compliance check never silently "passes".
  policy_baseline: soc2

auth:
  # OIDC bearer auth for the token-gated API + dashboard (issue #34). OPTIONAL
  # and additive: when configured, a valid OIDC JWT from your IdP is accepted on
  # the Authorization: Bearer header IN ADDITION TO the static FOUNDRY_API_TOKEN
  # (both can be enabled at once; either alone is enough to gate the API). Leave
  # this whole block out to keep the static-token-only behaviour unchanged.
  #
  # issuer/audience/jwks_uri are public IdP metadata (not secrets), so they live
  # here in YAML; all three are required together or startup fails (fail-closed,
  # so a half-configured deployment can't silently verify nothing). Env overrides:
  # FOUNDRY_OIDC_ISSUER / _AUDIENCE / _JWKS_URI / _ALGORITHMS / _LEEWAY_SECONDS.
  #
  # Needs the optional 'oidc' extra (pip install 'project-foundry[oidc]'); it is
  # bundled in the Docker image. Setting OIDC without the extra fails loud at
  # startup rather than on the first request.
  # oidc:
  #   issuer: "https://login.example.com/"          # the iss claim to require
  #   audience: "foundry-api"                        # the aud claim to require
  #   jwks_uri: "https://login.example.com/.well-known/jwks.json"
  #   algorithms: ["RS256"]   # signing-algorithm allow-list (no alg:none / HS confusion)
  #   leeway_seconds: 60      # clock-skew tolerance for exp/nbf
  #
  #   # --- approver identity + IdP-group -> role mapping (issue #34) ---
  #   # When an approval comes in over an OIDC-authenticated REST call, the
  #   # approver IDENTITY is taken from the VERIFIED token (subject_claim below,
  #   # falling back to "sub"), NOT the request body - a token holder can't
  #   # approve as someone else. ROLES are the committed `approval.approvers`
  #   # grant for that verified identity UNIONED with the roles the verified
  #   # group_claim maps to via group_role_map. The map is committed config; only
  #   # the cryptographically-signed claims come from the token (invariant #5).
  #   # Env overrides for the claim names: FOUNDRY_OIDC_SUBJECT_CLAIM /
  #   # FOUNDRY_OIDC_GROUP_CLAIM (the map itself is YAML-only).
  #   subject_claim: "email"   # verified claim that identifies the approver
  #   group_claim: "groups"    # verified claim carrying IdP group membership
  #   group_role_map:          # IdP group -> approver roles membership grants
  #     eng-leads: ["engineering"]
  #     security-team: ["security"]
  #     qa-guild: ["qa"]
  #
  #   # --- multi-tenancy / row-level isolation (issue #156) ---
  #   # Set org_claim to the VERIFIED token claim naming the caller's org to turn
  #   # on row-level isolation: every read and write in that request is scoped to
  #   # that org, so one tenant can never read or write another tenant's rows.
  #   # The org is taken only from the cryptographically-verified token, never the
  #   # request body (invariant #5). UNSET (the default) => single-tenant: every
  #   # row lives under the "default" org and behaviour is unchanged.
  #   # Env override: FOUNDRY_OIDC_ORG_CLAIM.
  #   org_claim: "org"         # verified claim naming the caller's org/tenant
  #
  #   # --- per-org WEBHOOK routing (issue #34) ---
  #   # Webhooks carry no OIDC token, so a webhook-created run / PR observation
  #   # would otherwise always land in the "default" org. Give each tenant org a
  #   # dedicated webhook secret and a delivery signed (HMAC: Linear/GitHub) or
  #   # tokened (GitLab/Jira) with it binds that org for the delivery; the global
  #   # secrets above keep mapping to the default org. The org comes from WHICH
  #   # committed secret matched, never the payload (invariant #5). Secret, so
  #   # env-only (no YAML): FOUNDRY_WEBHOOK_ORG_SECRETS as comma-separated
  #   # "org=secret" pairs, e.g.
  #   #   FOUNDRY_WEBHOOK_ORG_SECRETS="acme=whsec_acme123,globex=whsec_globex456"
  #   # Each secret must be distinct from the others and from the global webhook
  #   # secrets (rejected at startup otherwise). UNSET => single-tenant, unchanged.
  #
  #   # --- dashboard browser login / SSO (issue #34) ---
  #   # Lets an operator sign in to /dashboard via your IdP (OAuth2
  #   # authorization-code + PKCE) instead of pasting an API token. Builds on the
  #   # bearer config above: the same issuer/jwks verify the id_token (its
  #   # audience is the client_id below). The session cookie minted on success
  #   # authenticates the dashboard's READ calls only - it is rejected on the
  #   # approval endpoint (CSRF-safe), which still needs a bearer/webhook.
  #   #
  #   # The four parts below are public (not secrets) and all-or-nothing. Two
  #   # secrets are env-only and required to actually wire login (startup fails
  #   # loud if a part is configured but a secret is missing):
  #   #   FOUNDRY_OIDC_CLIENT_SECRET  - the OAuth client secret
  #   #   FOUNDRY_SESSION_SECRET      - HMAC key signing the session cookie
  #   # Env overrides for the parts: FOUNDRY_OIDC_CLIENT_ID /
  #   # _AUTHORIZATION_ENDPOINT / _TOKEN_ENDPOINT / _REDIRECT_URI / _SCOPES /
  #   # _SESSION_TTL_SECONDS / _COOKIE_SECURE.
  #   client_id: "foundry-dashboard"
  #   authorization_endpoint: "https://login.example.com/authorize"
  #   token_endpoint: "https://login.example.com/oauth/token"
  #   redirect_uri: "https://foundry.example.com/dashboard/auth/callback"
  #   scopes: ["openid", "email"]    # what the login requests from the IdP
  #   session_ttl_seconds: 28800     # how long a signed-in session lasts (8h)
  #   #
  #   # Sliding-session refresh (issue #34): when set, session_ttl_seconds becomes
  #   # the *idle* timeout and this is the absolute cap. Each authenticated request
  #   # slides the session forward, but never past the original login + this value,
  #   # so an active operator is not logged out mid-task while an abandoned session
  #   # still expires - and a real re-login (re-checking the IdP) is forced
  #   # periodically. Must be >= session_ttl_seconds. Unset (default) = sliding off
  #   # (fixed-TTL cookie, re-login on expiry). Env:
  #   # FOUNDRY_OIDC_SESSION_MAX_LIFETIME_SECONDS.
  #   session_max_lifetime_seconds: 86400   # absolute cap (24h)
  #   cookie_secure: true            # mark cookies Secure; false only for local HTTP
  #   #
  #   # RP-Initiated Logout (federated logout): when set, /dashboard/logout
  #   # deletes the local session cookie AND redirects on to the IdP's
  #   # end-session endpoint so the SSO session is terminated too - otherwise a
  #   # shared workstation silently re-authenticates on the next login. Optional;
  #   # unset = logout just clears the local cookie. post_logout_redirect_uri
  #   # (where the IdP returns the browser after logout) must be pre-registered
  #   # with the IdP and is only meaningful with end_session_endpoint set. Env:
  #   # FOUNDRY_OIDC_END_SESSION_ENDPOINT / FOUNDRY_OIDC_POST_LOGOUT_REDIRECT_URI.
  #   end_session_endpoint: "https://login.example.com/v2/logout"
  #   post_logout_redirect_uri: "https://foundry.example.com/dashboard"
  #
  # --- SCIM 2.0 provisioning (issue #157) ---
  # The SCIM /scim/v2/Users + /scim/v2/Groups surface lets your IdP provision and
  # DE-PROVISION the users/groups Foundry recognises, instead of hand-maintaining
  # the `approval.approvers` list below. It is gated by a dedicated env-only
  # provisioning bearer token (FOUNDRY_SCIM_BEARER_TOKEN) - there is no YAML knob
  # because it is a secret; UNSET => the surface is disabled (403) and approver-
  # role resolution never consults the provisioned directory, so a non-SCIM
  # deployment is unchanged. SCIM provisions MEMBERSHIP, never roles: an active
  # provisioned user's group memberships map to approver roles through the
  # committed `auth.oidc.group_role_map` above (the group displayName is the key),
  # and deactivating a user (active:false) or removing it from a group REVOKES
  # that authority (invariants #1, #5). A provisioned user binds to a verified
  # OIDC approval by userName == the verified subject claim (email).

notifications:
  # Channel id (e.g. "C01APPROVALS") Foundry posts approval messages + status
  # updates into. Needs FOUNDRY_SLACK_BOT_TOKEN set too; either missing => no
  # outbound Slack. Leave unset to disable.
  slack_channel: "C01APPROVALS"

triggers:
  # A run starts only on an explicit opt-in, never for every new issue.
  label: "foundry:candidate"
  status: "Ready for AI Analysis"

epics:
  # When a triggered ticket spans several repositories - either an explicit
  # "Repositories:" section (one "- repo: scope" bullet per repo) or >= 2
  # associated repos - decompose it at intake into one INDEPENDENTLY-gated child
  # run per repo, grouped under a parent epic run (issue #35). Each child is
  # analysed, risk-classified, planned, policy-gated and approved on its own; no
  # gate is weakened. Off by default - the deterministic producer is
  # conservative, but auto-fanning one ticket into several governed runs is a
  # behaviour change you opt into. A ticket that doesn't decompose runs as a
  # single ordinary run either way. (env override: FOUNDRY_EPICS_AUTO_DECOMPOSE)
  auto_decompose: false

approval:
  # Who may run /foundry approve, and which approval roles each person's
  # sign-off grants. Roles are CONFIG, never request payload - an API caller
  # cannot claim "security" for themselves. Empty means nobody can approve.
  # Key approvers by the identity the surface reports: email for Linear/Jira/REST,
  # GitHub login for GitHub Issues, Slack user id for the Slack approval surface.
  approvers:
    - email: "lead@example.com"
      roles: ["engineering"]
    - email: "security@example.com"
      roles: ["security"]
    # Approvers with no roles can approve ordinary work but cannot satisfy
    # sensitive-area approval requirements (auth, payments, PII, ...).
    - email: "pm@example.com"
      roles: []

temporal:
  # Durable execution worker. Address is often set via TEMPORAL_ADDRESS.
  address: "localhost:7233"
  task_queue: "foundry-ticket-to-pr"

context:
  # Which enricher decides the target repository for each ticket:
  #   static  - keyword lists only (default, no DB required)
  #   catalog - scores against GitHub org metadata synced by 'foundry-catalog sync'
  #   code    - catalog scoring plus code facts (file tree, test layout,
  #             CODEOWNERS, manifests) gathered by 'foundry-catalog sync
  #             --code-facts'; reasons cite concrete paths and owners, and
  #             plans/risk get structured code context
  # Override with FOUNDRY_CONTEXT_PROVIDER.
  provider: static
  # GitHub org to sync with 'foundry-catalog sync'. Override with FOUNDRY_CONTEXT_ORG.
  # org: acme
  # How many days before a catalog entry is considered stale (default: 7).
  max_catalog_age_days: 7
  # Maximum GitHub API calls per sync sweep (default: 3000).
  sync_call_budget: 3000
  # Gather code facts during sync even when provider is not "code" (the code
  # provider implies this). Raises the worst-case sync cost from 3 to 9 API
  # calls per repo (tree + CODEOWNERS + up to 4 root manifests).
  sync_code_facts: false
  # How many file-tree paths to store per repo (shallowest kept first; trees
  # beyond the cap are marked truncated). Minimum 100.
  tree_max_paths: 2000
  # Repo -> keyword hints. With provider: static (the default) this map IS the
  # routing catalog the enricher scores tickets against; with provider:
  # catalog / code it's merged into the synced org catalog as manual hints.
  # repo_keywords:
  #   acme/billing-service: ["invoice", "stripe"]

memory:
  # Delivery memory: routing priors mined from this org's own finished runs
  # ("14 of 16 of this team's tickets merged in billing-service"). Catalog/code
  # context providers only; inert until min_samples routed outcomes exist.
  # Backfill historical runs with 'foundry-memory backfill'.
  priors_enabled: true
  # Routed runs required before history influences routing (default: 3).
  min_samples: 3
  # Confidence ceiling for priors (default: 89) - keeps history below an
  # explicit repo association on the ticket (90).
  confidence_cap: 89

compliance:
  # Compliance evidence packs map a run's recorded chain onto named controls,
  # exported one-click via 'GET /runs/{id}/evidence' (JSON, or ?format=html).
  # This is config, not code: uncomment to override the built-in defaults
  # (SOC 2 CC8.1, ISO/IEC 27001:2022 A.8.32, EU AI Act Article 14). A control
  # is "satisfied" for a run when every evidence section it names is present.
  # Valid section names: ticket, analysis, context, plan, risk_assessment,
  # approvals, policy_decisions, agent_jobs, pr, final_summary, audit_trail,
  # integrity. An unknown section name is rejected at startup.
  # control_mappings:
  #   - framework: "SOC 2"
  #     control_id: "CC8.1"
  #     title: "Change management"
  #     evidence: [ticket, plan, risk_assessment, approvals, policy_decisions, pr, audit_trail]
  #   - framework: "EU AI Act"
  #     control_id: "Article 14"
  #     title: "Human oversight"
  #     evidence: [risk_assessment, approvals, policy_decisions]
