# Alembic configuration for Foundry.
#
# The database URL is taken from FOUNDRY_DATABASE_URL (see migrations/env.py);
# the value below is only the offline fallback for local SQLite development.

[alembic]
script_location = migrations
sqlalchemy.url = sqlite+pysqlite:///foundry.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
